name: Build APK (Gradle)

on:
  push:
    branches: [main, beta]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type: debug or release'
        required: false
        default: 'release'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build, Release, and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: |
          npm cache clean --force
          npm ci || npm install
        working-directory: superbrain-app

      - name: Set Android SDK local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > superbrain-app/android/local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.npm
          key: gradle-npm-${{ hashFiles('superbrain-app/package-lock.json', 'superbrain-app/android/**/*.gradle*', 'superbrain-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-npm-
            gradle-

      - name: Make gradlew executable
        run: chmod +x superbrain-app/android/gradlew

      - name: Build APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          TASK="assemble$(echo ${BUILD_TYPE^})"
          cd superbrain-app/android && ./gradlew $TASK --no-daemon --stacktrace

      - name: Find and upload APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          APK_PATH=$(find superbrain-app/android/app/build/outputs/apk/${BUILD_TYPE} -name "*.apk" | head -1)
          echo "APK found at: $APK_PATH"
          cp "$APK_PATH" superbrain.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: superbrain-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
          path: superbrain.apk
          retention-days: 30

      - name: Resolve release and package metadata
        id: meta
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          VERSION_BASE=$(node -e "const v=require('./superbrain-cli/package.json').version; console.log(v.split('-')[0]);")
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]')
          VERSION="${VERSION_BASE}-${SAFE_BRANCH}.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          if [ "$BRANCH_NAME" = "beta" ]; then
            RELEASE_TAG="beta-latest"
            RELEASE_NAME="SuperBrain Beta Latest"
            DIST_TAG="beta"
            IS_PRERELEASE="true"
            MAKE_LATEST="false"
          else
            RELEASE_TAG="latest"
            RELEASE_NAME="SuperBrain Latest"
            DIST_TAG="latest"
            IS_PRERELEASE="false"
            MAKE_LATEST="true"
          fi

          {
            echo "release_tag=$RELEASE_TAG"
            echo "release_name=$RELEASE_NAME"
            echo "dist_tag=$DIST_TAG"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "make_latest=$MAKE_LATEST"
            echo "owner_scope=@${OWNER_LC}"
            echo "package_version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Force-update release tag to current commit
        shell: bash
        run: |
          git tag -f "${{ steps.meta.outputs.release_tag }}" "${GITHUB_SHA}"
          git push -f origin "refs/tags/${{ steps.meta.outputs.release_tag }}"

      - name: Create or update GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          generate_release_notes: true
          overwrite_files: true
          files: superbrain.apk

      - name: Prepare package payload
        run: node scripts/build.js
        working-directory: superbrain-cli

      - name: Set GitHub Packages publish metadata
        shell: bash
        run: |
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          cd superbrain-cli
          npm pkg set "name=${{ steps.meta.outputs.owner_scope }}/superbrain-server"
          npm pkg set "version=${{ steps.meta.outputs.package_version }}"
          npm pkg set "repository=${REPO_URL}"
          npm pkg set "publishConfig.registry=https://npm.pkg.github.com"

      - name: Configure npm auth for GitHub Packages
        shell: bash
        run: |
          echo "${{ steps.meta.outputs.owner_scope }}:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package to GitHub Packages
        run: npm publish --tag "${{ steps.meta.outputs.dist_tag }}"
        working-directory: superbrain-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
