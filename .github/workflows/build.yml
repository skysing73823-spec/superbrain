name: Build APK (Gradle)

on:
  push:
    branches: [main, beta]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type: debug or release'
        required: false
        default: 'release'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: npm ci
        working-directory: superbrain-app

      - name: Set Android SDK local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > superbrain-app/android/local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.npm
          key: gradle-npm-${{ hashFiles('superbrain-app/package-lock.json', 'superbrain-app/android/**/*.gradle*', 'superbrain-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-npm-
            gradle-

      - name: Make gradlew executable
        run: chmod +x superbrain-app/android/gradlew

      - name: Build APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          TASK="assemble$(echo ${BUILD_TYPE^})"
          cd superbrain-app/android && ./gradlew $TASK --no-daemon --stacktrace

      - name: Find and upload APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          APK_PATH=$(find superbrain-app/android/app/build/outputs/apk/${BUILD_TYPE} -name "*.apk" | head -1)
          echo "APK found at: $APK_PATH"
          cp "$APK_PATH" superbrain.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: superbrain-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
          path: superbrain.apk
          retention-days: 30
